<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAKTYC900 | GitHub Profile</title>

<style>
body{
    margin:0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

.header{
    display:flex;
    align-items:center;
    gap:30px;
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:15px;
    backdrop-filter: blur(10px);
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #38bdf8;
}

.name{
    font-size:32px;
    font-weight:600;
}

.bio{
    opacity:0.8;
}

.stats{
    display:flex;
    gap:20px;
    margin-top:10px;
}

.stat{
    background:rgba(255,255,255,0.07);
    padding:8px 14px;
    border-radius:8px;
}

.repos{
    margin-top:40px;
}

.repo-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.repo{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:12px;
    transition:0.2s;
}

.repo:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,0.08);
}

.repo a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:bold;
}

.footer{
    margin-top:50px;
    text-align:center;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img id="avatar" class="avatar">
<div>
<div id="name" class="name"></div>
<div id="bio" class="bio"></div>

<div class="stats">
<div class="stat">Repos: <span id="repos"></span></div>
<div class="stat">Followers: <span id="followers"></span></div>
<div class="stat">Following: <span id="following"></span></div>
</div>
</div>
</div>

<div class="repos">
<h2>Мои проекты</h2>
<div id="repoList" class="repo-grid"></div>
</div>

<div class="footer">
Сайт автоматически получает данные из GitHub API
</div>

</div>

<script>

const username = "KAKTYC900";

fetch(`https://api.github.com/users/${username}`)
.then(res=>res.json())
.then(data=>{
document.getElementById("avatar").src = data.avatar_url;
document.getElementById("name").textContent = data.name || data.login;
document.getElementById("bio").textContent = data.bio || "GitHub разработчик";
document.getElementById("repos").textContent = data.public_repos;
document.getElementById("followers").textContent = data.followers;
document.getElementById("following").textContent = data.following;
});

fetch(`https://api.github.com/users/${username}/repos?sort=updated`)
.then(res=>res.json())
.then(repos=>{
const repoList = document.getElementById("repoList");

repos.slice(0,12).forEach(repo=>{
const div = document.createElement("div");
div.className="repo";

div.innerHTML = `
<a href="${repo.html_url}" target="_blank">${repo.name}</a>
<p>${repo.description || "Нет описания"}</p>
`;

repoList.appendChild(div);
});
});

</script>

</body>
</html>
